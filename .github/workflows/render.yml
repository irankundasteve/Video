name: Render Video with Remotion

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          npm install

      - name: Render Video
        run: npm run build

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: out/video.mp4
