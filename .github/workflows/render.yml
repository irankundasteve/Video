name: Render Video

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg wget
          # Fix ImageMagick security policy for MoviePy
          sudo sed -i 's/policy domain="path" rights="none" pattern="@\*"/policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml
          pip install -r requirements.txt

      - name: Render Video
        run: python main.py

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: 3-minute-video
          path: 3min_video.mp4
