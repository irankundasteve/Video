name: Render Video with Remotion

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      composition_id:
        description: 'The ID of the composition to render'
        required: true
        default: 'BakerBarberKinetic'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          npm install

      - name: Render Video
        run: |
          # Use the input ID if manually triggered, otherwise default to BakerBarberKinetic
          COMP_ID=${{ github.event.inputs.composition_id || 'BakerBarberKinetic' }}
          npx remotion render src/index.ts $COMP_ID out/video.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.composition_id || 'BakerBarberKinetic' }}-video
          path: out/video.mp4
